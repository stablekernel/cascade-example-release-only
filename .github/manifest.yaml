ci:
    config:
        schema_version: 1
        trunk_branch: main
        triggers:
            - src/**
        cli_version: v0.9.1-rc.1
        cli_version_sha: 8ec4e065d139685919b62324c39322d585bd4bbd
        tag_prefix: rel-
        state_token: ${{ secrets.CASCADE_STATE_TOKEN }}
        manifest_file: .github/manifest.yaml
        manifest_key: ci
        builds:
            - name: lib
              workflow: .github/workflows/build-lib.yaml
              triggers: []
        changelog:
            contributors: true
