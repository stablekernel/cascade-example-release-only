ci:
    config:
        schema_version: 1
        trunk_branch: main
        triggers:
            - src/**
        cli_version: v0.9.2-rc.0
        cli_version_sha: f697532d2785ef06951348c4430a958acb73105d
        tag_prefix: rel-
        state_token: ${{ secrets.CASCADE_STATE_TOKEN }}
        manifest_file: .github/manifest.yaml
        manifest_key: ci
        builds:
            - name: lib
              workflow: .github/workflows/build-lib.yaml
              triggers: []
        changelog:
            contributors: true
